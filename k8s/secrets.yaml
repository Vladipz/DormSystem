apiVersion: v1
kind: Secret
metadata:
  name: dormsystem-secrets
  namespace: dormsystem
type: Opaque
stringData:
  # PostgreSQL credentials
  POSTGRES_USER: "dormsystem"
  POSTGRES_PASSWORD: "change-me-in-production"

  # RabbitMQ credentials
  RABBITMQ_DEFAULT_USER: "admin"
  RABBITMQ_DEFAULT_PASS: "change-me-in-production"

  # JWT Secret (should be a strong random string)
  JWT_SECRET: "your-super-secret-jwt-key-change-me-in-production"
  JWT_ISSUER: "DormSystem"
  JWT_AUDIENCE: "DormSystemAPI"
  JWT_EXPIRATION_MINUTES: "60"

  # Telegram Bot Token (if using Telegram notifications)
  TELEGRAM_BOT_TOKEN: "your-telegram-bot-token-here"

  # Connection strings
  AUTH_DB_CONNECTION: "Host=postgres-service;Port=5432;Database=auth_db;Username=dormsystem;Password=change-me-in-production"
  EVENTS_DB_CONNECTION: "Host=postgres-service;Port=5432;Database=events_db;Username=dormsystem;Password=change-me-in-production"
