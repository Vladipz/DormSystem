apiVersion: v1
kind: ConfigMap
metadata:
  name: dormsystem-config
  namespace: dormsystem
data:
  # Database connections
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "dormsystem"

  # RabbitMQ configuration
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_MANAGEMENT_PORT: "15672"

  # Service URLs (internal communication)
  AUTH_SERVICE_URL: "http://auth-service:8080"
  EVENTS_SERVICE_URL: "http://events-service:8080"
  ROOMS_SERVICE_URL: "http://rooms-service:8080"
  BOOKING_SERVICE_URL: "http://booking-service:8080"
  INSPECTIONS_SERVICE_URL: "http://inspections-service:8080"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8080"
  TELEGRAM_SERVICE_URL: "http://telegram-service:8080"
  FILE_SERVICE_URL: "http://file-service:8080"
  API_GATEWAY_URL: "http://api-gateway:8080"

  # Application settings
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"

  # CORS origins (update with your actual domain)
  CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
