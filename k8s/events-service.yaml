apiVersion: apps/v1
kind: Deployment
metadata:
  name: events-service
  namespace: dormsystem
  labels:
    app: events-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: events-service
  template:
    metadata:
      labels:
        app: events-service
    spec:
      containers:
        - name: events-service
          image: dormsystem/events-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: dormsystem-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: dormsystem-config
                  key: ASPNETCORE_URLS
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: dormsystem-secrets
                  key: EVENTS_DB_CONNECTION
            - name: JwtSettings__Secret
              valueFrom:
                secretKeyRef:
                  name: dormsystem-secrets
                  key: JWT_SECRET
            - name: RabbitMQ__Host
              valueFrom:
                configMapKeyRef:
                  name: dormsystem-config
                  key: RABBITMQ_HOST
            - name: RabbitMQ__Username
              valueFrom:
                secretKeyRef:
                  name: dormsystem-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: dormsystem-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: UserServiceUrl
              valueFrom:
                configMapKeyRef:
                  name: dormsystem-config
                  key: AUTH_SERVICE_URL
            - name: FileServiceUrl
              valueFrom:
                configMapKeyRef:
                  name: dormsystem-config
                  key: FILE_SERVICE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: events-service
  namespace: dormsystem
  labels:
    app: events-service
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: events-service
