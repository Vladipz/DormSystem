apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dormsystem-ingress
  namespace: dormsystem
  annotations:
    # Nginx Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"  # Update with your domain in production
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # Request size
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Let's Encrypt certificate (uncomment if using cert-manager)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # TLS configuration (uncomment and configure for HTTPS)
  # tls:
  #   - hosts:
  #       - dorm-system.example.com
  #     secretName: dormsystem-tls-secret
  rules:
    # API Gateway routes
    - host: dorm-system.example.com  # Replace with your actual domain
      http:
        paths:
          # API routes go through API Gateway
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80

          # Frontend routes
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
# Optional: Ingress for development/testing without domain
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dormsystem-ingress-dev
  namespace: dormsystem
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Direct service access for development
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 8080
          - path: /events(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: events-service
                port:
                  number: 8080
          - path: /rooms(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: rooms-service
                port:
                  number: 8080
          - path: /booking(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: booking-service
                port:
                  number: 8080
          - path: /inspections(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: inspections-service
                port:
                  number: 8080
          - path: /files(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: file-service
                port:
                  number: 8080
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
