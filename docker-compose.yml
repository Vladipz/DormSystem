services:

  # в”Ђв”Ђ Infrastructure в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # в”Ђв”Ђ Application Services в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  auth-service:
    build:
      context: ./Services
      dockerfile: Auth/Auth.API/Dockerfile
    container_name: auth-service
    environment:
      - "ConnectionStrings__auth-db=Host=postgres;Port=5432;Database=auth-db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      - "Jwt__Secret=${JWT_SECRET}"
      - "Jwt__Issuer=${JWT_ISSUER}"
      - "Jwt__Audience=${JWT_AUDIENCE}"
      - "Jwt__AccessTokenExpirationMinutes=${JWT_ACCESS_EXPIRY_MINUTES}"
      - "Jwt__RefreshTokenExpirationDays=${JWT_REFRESH_EXPIRY_DAYS}"
      - "AdminSettings__Email=${ADMIN_EMAIL}"
      - "AdminSettings__Password=${ADMIN_PASSWORD}"
      - "AdminSettings__FirstName=${ADMIN_FIRST_NAME}"
      - "AdminSettings__LastName=${ADMIN_LAST_NAME}"
      - "services__file-storage-service__http__0=http://file-storage-service:8080"
      - "ASPNETCORE_ENVIRONMENT=Production"
    depends_on:
      postgres:
        condition: service_healthy

  event-service:
    build:
      context: ./Services
      dockerfile: Events/Events.API/Dockerfile
    container_name: event-service
    environment:
      - "ConnectionStrings__events-db=Host=postgres;Port=5432;Database=events-db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      - "ConnectionStrings__rabbitmq=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672"
      - "Jwt__Secret=${JWT_SECRET}"
      - "Jwt__Issuer=${JWT_ISSUER}"
      - "Jwt__Audience=${JWT_AUDIENCE}"
      - "services__auth-service__http__0=http://auth-service:8080"
      - "ASPNETCORE_ENVIRONMENT=Production"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  room-service:
    build:
      context: ./Services
      dockerfile: Rooms/Rooms.API/Dockerfile
    container_name: room-service
    environment:
      - "ConnectionStrings__rooms-db=Host=postgres;Port=5432;Database=rooms-db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      - "ConnectionStrings__rabbitmq=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672"
      - "services__auth-service__http__0=http://auth-service:8080"
      - "services__file-storage-service__http__0=http://file-storage-service:8080"
      - "ASPNETCORE_ENVIRONMENT=Production"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inspection-service:
    build:
      context: ./Services
      dockerfile: Inspections/Inspections.API/Dockerfile
    container_name: inspection-service
    environment:
      - "ConnectionStrings__inspections-db=Host=postgres;Port=5432;Database=inspections-db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      - "ConnectionStrings__rabbitmq=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672"
      - "Jwt__Secret=${JWT_SECRET}"
      - "Jwt__Issuer=${JWT_ISSUER}"
      - "Jwt__Audience=${JWT_AUDIENCE}"
      - "services__auth-service__http__0=http://auth-service:8080"
      - "services__room-service__http__0=http://room-service:8080"
      - "ASPNETCORE_ENVIRONMENT=Production"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./Services
      dockerfile: NotificationCore/NotificationCore.API/Dockerfile
    container_name: notification-service
    environment:
      - "ConnectionStrings__notifications-db=Host=postgres;Port=5432;Database=notifications-db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      - "ConnectionStrings__rabbitmq=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672"
      - "Jwt__Secret=${JWT_SECRET}"
      - "Jwt__Issuer=${JWT_ISSUER}"
      - "Jwt__Audience=${JWT_AUDIENCE}"
      - "services__auth-service__http__0=http://auth-service:8080"
      - "services__room-service__http__0=http://room-service:8080"
      - "ASPNETCORE_ENVIRONMENT=Production"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  telegram-service:
    build:
      context: ./Services
      dockerfile: TelegramAgent/TelegramAgent.API/Dockerfile
    container_name: telegram-service
    environment:
      - "ConnectionStrings__telegram-db=Host=postgres;Port=5432;Database=telegram-db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      - "ConnectionStrings__rabbitmq=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672"
      - "TelegramBot__Token=${TELEGRAM_BOT_TOKEN}"
      - "Services__AuthService__BaseUrl=http://auth-service:8080"
      - "ASPNETCORE_ENVIRONMENT=Production"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  file-storage-service:
    build:
      context: ./Services
      dockerfile: FileStorage/FileStorage.API/Dockerfile
    container_name: file-storage-service
    environment:
      - "FileStorage__StoragePath=/app/storage"
      - "ASPNETCORE_ENVIRONMENT=Production"
    volumes:
      - filestorage_data:/app/storage

  booking-service:
    build:
      context: ./Services
      dockerfile: Booking/Booking.API/Dockerfile
    container_name: booking-service
    environment:
      - "ASPNETCORE_ENVIRONMENT=Production"

  api-gateway:
    build:
      context: ./Services
      dockerfile: ApiGateway/Dockerfile
    container_name: api-gateway
    ports:
      - "5095:8080"
    environment:
      - "Jwt__Secret=${JWT_SECRET}"
      - "Jwt__Issuer=${JWT_ISSUER}"
      - "Jwt__Audience=${JWT_AUDIENCE}"
      - "services__auth-service__http__0=http://auth-service:8080"
      - "services__event-service__http__0=http://event-service:8080"
      - "services__room-service__http__0=http://room-service:8080"
      - "services__inspection-service__http__0=http://inspection-service:8080"
      - "services__notification-service__http__0=http://notification-service:8080"
      - "services__file-storage-service__http__0=http://file-storage-service:8080"
      - "services__booking-service__http__0=http://booking-service:8080"
      - "services__telegram-service__http__0=http://telegram-service:8080"
      - "ASPNETCORE_ENVIRONMENT=Production"

volumes:
  postgres_data:
  rabbitmq_data:
  filestorage_data:
