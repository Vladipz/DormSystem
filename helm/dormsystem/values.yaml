# Default values for DormSystem Helm Chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  namespace: dormsystem
  imagePullPolicy: Always
  domain: dorm-system.example.com

# Image registry
imageRegistry: docker.io
imageTag: latest

# PostgreSQL configuration
postgresql:
  enabled: true
  image: postgres:13-alpine
  replicas: 1
  storage: 10Gi
  database: dormsystem
  username: dormsystem
  # Password should be provided via --set or secret
  password: "change-me-in-production"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# RabbitMQ configuration
rabbitmq:
  enabled: true
  image: rabbitmq:3-management-alpine
  replicas: 1
  storage: 5Gi
  username: admin
  # Password should be provided via --set or secret
  password: "change-me-in-production"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# JWT configuration
jwt:
  secret: "your-super-secret-jwt-key-change-me-in-production"
  issuer: "DormSystem"
  audience: "DormSystemAPI"
  expirationMinutes: 60

# Telegram configuration
telegram:
  botToken: "your-telegram-bot-token-here"

# Microservices configuration
services:
  auth:
    enabled: true
    image: dormsystem/auth-service
    replicas: 2
    port: 8080
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  events:
    enabled: true
    image: dormsystem/events-service
    replicas: 2
    port: 8080
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  rooms:
    enabled: true
    image: dormsystem/rooms-service
    replicas: 2
    port: 8080
    storage: 2Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  booking:
    enabled: true
    image: dormsystem/booking-service
    replicas: 2
    port: 8080
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  inspections:
    enabled: true
    image: dormsystem/inspections-service
    replicas: 2
    port: 8080
    storage: 2Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  notification:
    enabled: true
    image: dormsystem/notification-service
    replicas: 2
    port: 8080
    storage: 1Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  telegram:
    enabled: true
    image: dormsystem/telegram-service
    replicas: 1  # Should be 1 for Telegram bot
    port: 8080
    storage: 1Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  file:
    enabled: true
    image: dormsystem/file-service
    replicas: 2
    port: 8080
    storage: 20Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "200m"

# API Gateway configuration
apiGateway:
  enabled: true
  image: dormsystem/api-gateway
  replicas: 3
  port: 8080
  serviceType: LoadBalancer  # Can be: ClusterIP, NodePort, LoadBalancer
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Frontend configuration
frontend:
  enabled: true
  image: dormsystem/frontend
  replicas: 3
  port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Uncomment for Let's Encrypt
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: false
    # secretName: dormsystem-tls-secret
  hosts:
    - host: dorm-system.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: api-gateway
          port: 80
        - path: /
          pathType: Prefix
          service: frontend
          port: 80

# CORS configuration
cors:
  origins: "http://localhost:3000,http://localhost:5173"

# Environment
environment: Production
