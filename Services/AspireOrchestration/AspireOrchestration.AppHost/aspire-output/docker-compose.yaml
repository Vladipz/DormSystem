    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${NOTIFICATION_SERVICE_PORT}"
      ConnectionStrings__notifications-db: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=notifications-db"
      NOTIFICATIONS_DB_HOST: "postgres"
      NOTIFICATIONS_DB_PORT: "5432"
      NOTIFICATIONS_DB_USERNAME: "postgres"
      NOTIFICATIONS_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      NOTIFICATIONS_DB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/notifications-db"
      NOTIFICATIONS_DB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/notifications-db"
