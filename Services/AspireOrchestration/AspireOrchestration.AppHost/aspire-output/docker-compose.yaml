    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${TELEGRAM_SERVICE_PORT}"
      ConnectionStrings__telegram-db: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=telegram-db"
      TELEGRAM_DB_HOST: "postgres"
      TELEGRAM_DB_PORT: "5432"
      TELEGRAM_DB_USERNAME: "postgres"
      TELEGRAM_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      TELEGRAM_DB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/telegram-db"
      TELEGRAM_DB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/telegram-db"
      TELEGRAM_DB_DATABASENAME: "telegram-db"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      TelegramBot__Token: "${BOTTOKEN}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "telegram-service"
    expose:
      - "${TELEGRAM_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
    networks:
      - "aspire"
  booking-service:
    image: "${BOOKING_SERVICE_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${BOOKING_SERVICE_PORT}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "booking-service"
    expose:
      - "${BOOKING_SERVICE_PORT}"
    networks:
      - "aspire"
  api-gateway:
    image: "${API_GATEWAY_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${API_GATEWAY_PORT}"
      AUTH_SERVICE_HTTP: "http://auth-service:${AUTH_SERVICE_PORT}"
      services__auth-service__http__0: "http://auth-service:${AUTH_SERVICE_PORT}"
      AUTH_SERVICE_HTTPS: "https://auth-service:${AUTH_SERVICE_PORT}"
      EVENT_SERVICE_HTTP: "http://event-service:${EVENT_SERVICE_PORT}"
      services__event-service__http__0: "http://event-service:${EVENT_SERVICE_PORT}"
      EVENT_SERVICE_HTTPS: "https://event-service:${EVENT_SERVICE_PORT}"
      INSPECTION_SERVICE_HTTP: "http://inspection-service:${INSPECTION_SERVICE_PORT}"
      services__inspection-service__http__0: "http://inspection-service:${INSPECTION_SERVICE_PORT}"
      INSPECTION_SERVICE_HTTPS: "https://inspection-service:${INSPECTION_SERVICE_PORT}"
      ROOM_SERVICE_HTTP: "http://room-service:${ROOM_SERVICE_PORT}"
      services__room-service__http__0: "http://room-service:${ROOM_SERVICE_PORT}"
      ROOM_SERVICE_HTTPS: "https://room-service:${ROOM_SERVICE_PORT}"
      NOTIFICATION_SERVICE_HTTP: "http://notification-service:${NOTIFICATION_SERVICE_PORT}"
      services__notification-service__http__0: "http://notification-service:${NOTIFICATION_SERVICE_PORT}"
      NOTIFICATION_SERVICE_HTTPS: "https://notification-service:${NOTIFICATION_SERVICE_PORT}"
      TELEGRAM_SERVICE_HTTP: "http://telegram-service:${TELEGRAM_SERVICE_PORT}"
      services__telegram-service__http__0: "http://telegram-service:${TELEGRAM_SERVICE_PORT}"
      TELEGRAM_SERVICE_HTTPS: "https://telegram-service:${TELEGRAM_SERVICE_PORT}"
      FILE_STORAGE_SERVICE_HTTP: "http://file-storage-service:${FILE_STORAGE_SERVICE_PORT}"
      services__file-storage-service__http__0: "http://file-storage-service:${FILE_STORAGE_SERVICE_PORT}"
      FILE_STORAGE_SERVICE_HTTPS: "https://file-storage-service:${FILE_STORAGE_SERVICE_PORT}"
      BOOKING_SERVICE_HTTP: "http://booking-service:${BOOKING_SERVICE_PORT}"
      services__booking-service__http__0: "http://booking-service:${BOOKING_SERVICE_PORT}"
      BOOKING_SERVICE_HTTPS: "https://booking-service:${BOOKING_SERVICE_PORT}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "api-gateway"
    expose:
      - "${API_GATEWAY_PORT}"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  shared_postgres_data:
    driver: "local"
  rabbitmq_data:
    driver: "local"
