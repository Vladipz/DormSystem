      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${INSPECTION_SERVICE_PORT}"
      ConnectionStrings__inspections-db: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=inspections-db"
      INSPECTIONS_DB_HOST: "postgres"
      INSPECTIONS_DB_PORT: "5432"
      INSPECTIONS_DB_USERNAME: "postgres"
      INSPECTIONS_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      INSPECTIONS_DB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/inspections-db"
      INSPECTIONS_DB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/inspections-db"
      INSPECTIONS_DB_DATABASENAME: "inspections-db"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      ROOM_SERVICE_HTTP: "http://room-service:${ROOM_SERVICE_PORT}"
      services__room-service__http__0: "http://room-service:${ROOM_SERVICE_PORT}"
      ROOM_SERVICE_HTTPS: "https://room-service:${ROOM_SERVICE_PORT}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "inspection-service"
    expose:
      - "${INSPECTION_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
    networks:
