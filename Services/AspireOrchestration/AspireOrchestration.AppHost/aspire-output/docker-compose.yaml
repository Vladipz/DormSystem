      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      ROOM_SERVICE_HTTP: "http://room-service:${ROOM_SERVICE_PORT}"
      services__room-service__http__0: "http://room-service:${ROOM_SERVICE_PORT}"
