services:
  compose-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  postgres:
    image: "docker.io/library/postgres:17.6"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "shared_postgres_data"
        read_only: false
    networks:
      - "aspire"
  rabbitmq:
    image: "docker.io/library/rabbitmq:4.2-management"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    expose:
      - "5672"
      - "15672"
    volumes:
      - type: "volume"
        target: "/var/lib/rabbitmq"
        source: "rabbitmq_data"
        read_only: false
    networks:
      - "aspire"
  auth-service:
    image: "${AUTH_SERVICE_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${AUTH_SERVICE_PORT}"
      ConnectionStrings__auth-db: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=auth-db"
      AUTH_DB_HOST: "postgres"
      AUTH_DB_PORT: "5432"
      AUTH_DB_USERNAME: "postgres"
      AUTH_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      AUTH_DB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/auth-db"
      AUTH_DB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/auth-db"
      AUTH_DB_DATABASENAME: "auth-db"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "auth-service"
    expose:
      - "${AUTH_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: "service_started"
    networks:
      - "aspire"
  event-service:
    image: "${EVENT_SERVICE_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${EVENT_SERVICE_PORT}"
      ConnectionStrings__events-db: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=events-db"
      EVENTS_DB_HOST: "postgres"
      EVENTS_DB_PORT: "5432"
      EVENTS_DB_USERNAME: "postgres"
      EVENTS_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      EVENTS_DB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/events-db"
      EVENTS_DB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/events-db"
      EVENTS_DB_DATABASENAME: "events-db"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      AUTH_SERVICE_HTTP: "http://auth-service:${AUTH_SERVICE_PORT}"
      services__auth-service__http__0: "http://auth-service:${AUTH_SERVICE_PORT}"
      AUTH_SERVICE_HTTPS: "https://auth-service:${AUTH_SERVICE_PORT}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "event-service"
    expose:
      - "${EVENT_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
    networks:
      - "aspire"
  room-service:
    image: "${ROOM_SERVICE_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${ROOM_SERVICE_PORT}"
      ConnectionStrings__rooms-db: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=rooms-db"
      ROOMS_DB_HOST: "postgres"
      ROOMS_DB_PORT: "5432"
      ROOMS_DB_USERNAME: "postgres"
      ROOMS_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      ROOMS_DB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/rooms-db"
      ROOMS_DB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/rooms-db"
      ROOMS_DB_DATABASENAME: "rooms-db"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      AUTH_SERVICE_HTTP: "http://auth-service:${AUTH_SERVICE_PORT}"
      services__auth-service__http__0: "http://auth-service:${AUTH_SERVICE_PORT}"
      AUTH_SERVICE_HTTPS: "https://auth-service:${AUTH_SERVICE_PORT}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "room-service"
    expose:
      - "${ROOM_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
    networks:
      - "aspire"
  file-storage-service:
    image: "${FILE_STORAGE_SERVICE_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${FILE_STORAGE_SERVICE_PORT}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "file-storage-service"
    expose:
      - "${FILE_STORAGE_SERVICE_PORT}"
    networks:
      - "aspire"
  inspection-service:
